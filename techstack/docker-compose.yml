version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: memwault-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: memwault
      POSTGRES_PASSWORD: memwault_dev_password
      POSTGRES_DB: memwault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memwault"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Celery Broker) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: memwault-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-Compatible Object Storage) ─────────────
  minio:
    image: minio/minio:latest
    container_name: memwault-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── MemWault Backend API ───────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memwault-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      MEMWAULT_DEBUG: "true"
      MEMWAULT_POSTGRES_HOST: postgres
      MEMWAULT_REDIS_URL: redis://redis:6379/0
      MEMWAULT_S3_ENDPOINT_URL: http://minio:9000
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  # ── Celery Worker (Background Scraper) ───────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memwault-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: celery -A app.scraper.tasks worker --loglevel=info --concurrency=2
    environment:
      MEMWAULT_DEBUG: "true"
      MEMWAULT_POSTGRES_HOST: postgres
      MEMWAULT_REDIS_URL: redis://redis:6379/0
      MEMWAULT_S3_ENDPOINT_URL: http://minio:9000
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app

  # ── Celery Beat (Cron Scheduler) ─────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: memwault-beat
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.scraper.tasks beat --loglevel=info
    environment:
      MEMWAULT_REDIS_URL: redis://redis:6379/0
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
  minio_data:
